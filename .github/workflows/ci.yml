name: CI

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [development, main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
